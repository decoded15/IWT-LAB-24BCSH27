<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script>
        function inc(){
            let x = document.getElementById("n").value
            x = parseInt(x) + 1
            document.getElementById("n").value = x
        }
        function dec(){
            let x = document.getElementById("n").value
            x = parseInt(x) - 1
            if (x < 0){
                alert("Value less than 0")
            }
            else{
                document.getElementById("n").value = x
            }
        }
    </script>
</head>
<body>
    <input type="number" name="" id="n">
    <input type="button" value="+" onclick="inc()">
    <input type="button" value="-" onclick="dec()">
</body>
</html>
